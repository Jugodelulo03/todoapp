services:
  # Contenedor principal de la aplicacion Node.js.
  app:
    build:
      # Usa la carpeta actual como contexto para construir la imagen con el Dockerfile.
      context: .
    # En local usa una imagen por defecto; en Jenkins se reemplaza por la imagen publicada.
    image: ${APP_IMAGE:-todoapp:local}
    # Si el proceso se cae, Docker intentara levantarlo otra vez automaticamente.
    restart: unless-stopped
    environment:
      # Dentro de Compose, la base se encuentra por el nombre del servicio `db`.
      MYSQL_HOST: db
      MYSQL_DB: ${MYSQL_DATABASE:-todoapp}
      MYSQL_USER: ${MYSQL_USER:-todoapp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      db:
        # Espera a que MySQL pase su healthcheck antes de arrancar la app.
        condition: service_healthy
    # Solo expone el puerto dentro de la red interna; Nginx es quien lo publica al host.
    expose:
      - "3000"

  # Base de datos persistente usada en el despliegue.
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-todoapp}
      MYSQL_USER: ${MYSQL_USER:-todoapp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      # Valida que MySQL ya acepte conexiones antes de que otros servicios dependan de el.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      # Conserva los datos aunque se vuelva a crear el contenedor.
      - mysql-data:/var/lib/mysql

  # Nginx recibe trafico HTTP y lo reenvia a la app en el puerto 3000.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      # Expone la aplicacion por el puerto 80 de la maquina host.
      - "80:80"
    volumes:
      # Monta la configuracion de Nginx del proyecto en modo solo lectura.
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  # Volumen nombrado para que MySQL no pierda la informacion al recrear contenedores.
  mysql-data:
